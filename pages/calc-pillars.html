<section class="card structural-card">
    <div class="card-header">
        <h2>Pillar Calculation (NBR 6118)</h2>
        <p>Insira as dimensões da seção, altura livre e os esforços característicos.</p>
    </div>
    
    <div class="card-body">
        <form id="calc-pillar-form">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="pil-L">Column Length (L) [m]</label>
                    <input type="number" id="pil-L" step="0.01" value="3.00" required>
                </div>
                <div class="form-group">
                    <label for="pil-fck">Concrete (fck) [MPa]</label>
                    <select id="pil-fck" required>
                        <option value="20">C20 (20 MPa)</option>
                        <option value="25" selected>C25 (25 MPa)</option>
                        <option value="30">C30 (30 MPa)</option>
                        <option value="40">C40 (40 MPa)</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="pil-b">Width (b) [cm]</label>
                    <input type="number" id="pil-b" step="0.1" value="20" required>
                </div>
                <div class="form-group">
                    <label for="pil-h">Depth (h) [cm]</label>
                    <input type="number" id="pil-h" step="0.1" value="40" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="pil-nk">Axial Load (Nk) [kN]</label>
                    <input type="number" id="pil-nk" step="1" value="500" required>
                </div>
                <div class="form-group">
                    <label for="pil-mk">Bending Moment (Mk) [kN.m]</label>
                    <input type="number" id="pil-mk" step="0.1" value="15" required>
                </div>
            </div>

            <button type="submit" class="btn-calculate">
                <i data-lucide="calculator" class="btn-icon"></i> Calculate Pillar
            </button>

        </form>

        <div id="pillar-results" class="results-box" style="display: none;">
            <h3>Resultados do Dimensionamento</h3>
            <div id="pillar-results-content"></div>
        </div>

    </div>
</section>

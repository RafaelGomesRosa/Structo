<section class="card structural-card">
    <div class="card-header">
        <h2>Beam Calculation</h2>
        <p>Enter beam dimensions and span parameters</p>
    </div>
    
    <div class="card-body">
        <form id="calc-beam-form">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="beam-span">Span / Vão (m)</label>
                    <input type="number" id="beam-span" name="beam-span" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="beam-load">Distributed Load (kN/m)</label>
                    <input type="number" id="beam-load" name="beam-load" step="0.01" required>
                </div>
            </div>

            <button type="submit" class="btn-calculate" style="background-color: #0ea5e9;">
                <i data-lucide="calculator" class="btn-icon"></i> Calculate Beam
            </button>

        </form>
    </div>
</section>
